AllCops:
  NewCops: enable
  TargetRubyVersion: 3.3

Layout/LineLength:
  Max: 150

Metrics/MethodLength:
  Max: 100

Metrics/BlockLength:
  Exclude:
    - "spec/**/*.rb"

Style/Documentation:
  Enabled: false

Style/OpenStructUse:
  Enabled: false

Metrics/AbcSize:
  Max: 60

Metrics/CyclomaticComplexity:
  Max: 20

Metrics/PerceivedComplexity:
  Max: 20

Lint/MissingSuper:
  Enabled: false