AllCops:
  NewCops: enable
  TargetRubyVersion: 3.3

Layout/LineLength:
  Max: 150

Metrics/ClassLength:
  Max: 500

Metrics/MethodLength:
  Max: 300

Metrics/CyclomaticComplexity:
  Max: 50

Style/Documentation:
  Enabled: false

Style/OpenStructUse:
  Enabled: false

Metrics/AbcSize:
  Max: 60

Metrics/CyclomaticComplexity:
  Max: 20

Metrics/PerceivedComplexity:
  Max: 20

Lint/MissingSuper:
  Enabled: false